<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc"><title id="title">SCRIBE Conceptual Architecture</title><desc id="desc">Conceptual architecture of SCRIBE with a central coordination layer, role inputs, decision memory, evidence and replay.</desc><style>.bg{fill:#fff}.title{font:700 34px Arial;fill:#111827}.sub{font:400 18px Arial;fill:#4b5563}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:14;ry:14}.core{fill:#eff6ff;stroke:#2563eb;stroke-width:2.5;rx:18;ry:18}.mem{fill:#f9fafb;stroke:#6b7280;stroke-width:2;rx:14;ry:14}.label{font:600 22px Arial;fill:#111827}.small{font:400 16px Arial;fill:#374151}.arrow{stroke:#4b5563;stroke-width:2.5;fill:none;marker-end:url(#a)}.blue{font:600 18px Arial;fill:#2563eb}.foot{font:400 18px Arial;fill:#111827}</style><defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#4b5563"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700" y="70" text-anchor="middle">SCRIBE Conceptual Architecture</text><text class="sub" x="700" y="102" text-anchor="middle">Public conceptual view — private engine not exposed</text><rect class="box" x="110" y="235" width="260" height="90"/><text class="label" x="240" y="270" text-anchor="middle">Human</text><text class="small" x="240" y="298" text-anchor="middle">Intent and final decision</text><rect class="box" x="110" y="415" width="260" height="90"/><text class="label" x="240" y="450" text-anchor="middle">Architect</text><text class="small" x="240" y="478" text-anchor="middle">Frames work and scope</text><rect class="box" x="1030" y="235" width="260" height="90"/><text class="label" x="1160" y="270" text-anchor="middle">Coder</text><text class="small" x="1160" y="298" text-anchor="middle">Proposes bounded changes</text><rect class="box" x="1030" y="415" width="260" height="90"/><text class="label" x="1160" y="450" text-anchor="middle">Auditor</text><text class="small" x="1160" y="478" text-anchor="middle">Reviews risks and evidence</text><rect class="core" x="455" y="285" width="490" height="180"/><text class="label" x="700" y="335" text-anchor="middle">SCRIBE</text><text class="small" x="700" y="365" text-anchor="middle">Governed coordination layer</text><text class="small" x="700" y="395" text-anchor="middle">Routes proposals through contracts, audit,</text><text class="small" x="700" y="420" text-anchor="middle">evidence and human decision points</text><text class="blue" x="700" y="447" text-anchor="middle">No agent self-validates</text><path class="arrow" d="M370 280h85"/><path class="arrow" d="M370 460h85"/><path class="arrow" d="M945 280h85"/><path class="arrow" d="M945 460h85"/><rect class="mem" x="240" y="625" width="260" height="90"/><text class="label" x="370" y="660" text-anchor="middle">Decision Memory</text><text class="small" x="370" y="688" text-anchor="middle">What, why, evidence</text><rect class="mem" x="570" y="625" width="260" height="90"/><text class="label" x="700" y="660" text-anchor="middle">Evidence</text><text class="small" x="700" y="688" text-anchor="middle">Diffs, tests, hashes, verdicts</text><rect class="mem" x="900" y="625" width="260" height="90"/><text class="label" x="1030" y="660" text-anchor="middle">Replay</text><text class="small" x="1030" y="688" text-anchor="middle">Reconstruct decision path</text><path class="arrow" d="M610 465l-190 160"/><path class="arrow" d="M700 465v160"/><path class="arrow" d="M790 465l190 160"/><text class="foot" x="700" y="820" text-anchor="middle">The public architecture explains the structure without publishing sensitive internals.</text></svg>