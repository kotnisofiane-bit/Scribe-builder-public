<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-label="SCRIBE decision trace and public / private boundary">
  <title>SCRIBE — Decision Trace / Public Boundary</title>
  <desc>Public decision trace (Agent proposal, SCRIBE check, Evidence, Human GO, Replay) and the public / private boundary between public surfaces, the private service boundary and the private core.</desc>

  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .brand   { fill:#3fc7b4; font-weight:700; letter-spacing:3px; }
    .cap      { fill:#8b97a3; font-weight:600; letter-spacing:3px; }
    .sub      { fill:#c9d1d9; }
    .muted    { fill:#8b97a3; }
    .light    { fill:#e6edf3; }
    .cyan     { fill:#3fc7b4; }
    .amber    { fill:#d6a13c; }
    .ptitle   { fill:#e6edf3; font-weight:600; letter-spacing:1.5px; }
  </style>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="640" fill="#0b1116"/>
  <rect x="16" y="16" width="1168" height="608" rx="16" fill="none" stroke="#1c2733" stroke-width="1"/>

  <!-- header -->
  <text x="60" y="62" class="brand" font-size="30">SCRIBE</text>
  <text x="60" y="90" class="muted" font-size="15">Decision Trace / Public Boundary</text>
  <text x="1140" y="62" class="muted" font-size="14" text-anchor="end">Public documentation &#183; Private core</text>
  <line x1="60" y1="108" x2="1140" y2="108" stroke="#1c2733" stroke-width="1"/>

  <!-- ============ Decision trace ============ -->
  <text x="60" y="146" class="cap" font-size="12">DECISION TRACE</text>

  <!-- rail -->
  <line x1="150" y1="192" x2="1050" y2="192" stroke="#3fc7b4" stroke-width="2" stroke-opacity="0.45"/>

  <!-- direction chevrons -->
  <text x="262" y="198" class="cyan" font-size="18" fill-opacity="0.5" text-anchor="middle">&#8250;</text>
  <text x="487" y="198" class="cyan" font-size="18" fill-opacity="0.5" text-anchor="middle">&#8250;</text>
  <text x="712" y="198" class="cyan" font-size="18" fill-opacity="0.5" text-anchor="middle">&#8250;</text>
  <text x="937" y="198" class="cyan" font-size="18" fill-opacity="0.5" text-anchor="middle">&#8250;</text>

  <!-- nodes -->
  <circle cx="150"  cy="192" r="8" fill="#3fc7b4"/>
  <circle cx="375"  cy="192" r="8" fill="#3fc7b4"/>
  <circle cx="600"  cy="192" r="8" fill="#3fc7b4"/>
  <circle cx="825"  cy="192" r="8.5" fill="none" stroke="#d6a13c" stroke-width="2.5"/>
  <circle cx="1050" cy="192" r="8" fill="#3fc7b4"/>

  <!-- node labels -->
  <text x="150"  y="228" class="light" font-size="17" text-anchor="middle">Agent proposal</text>
  <text x="375"  y="228" class="light" font-size="17" text-anchor="middle">SCRIBE check</text>
  <text x="600"  y="228" class="light" font-size="17" text-anchor="middle">Evidence</text>
  <text x="825"  y="228" class="amber" font-size="17" text-anchor="middle" font-weight="600">Human GO</text>
  <text x="1050" y="228" class="light" font-size="17" text-anchor="middle">Replay</text>

  <!-- ============ Public / private boundary ============ -->
  <text x="60" y="282" class="cap" font-size="12">PUBLIC / PRIVATE BOUNDARY</text>

  <!-- public surfaces panel -->
  <rect x="60" y="298" width="1080" height="66" rx="10" fill="#0e1a20" stroke="#3fc7b4" stroke-opacity="0.35" stroke-width="1"/>
  <text x="84" y="328" class="cyan" font-size="15" font-weight="600" letter-spacing="1.5">PUBLIC SURFACES</text>
  <text x="84" y="350" class="sub" font-size="15">Docs &#183; Launcher direction &#183; Eyes direction</text>

  <!-- boundary divider -->
  <line x1="90" y1="392" x2="1110" y2="392" stroke="#8b97a3" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5 6"/>
  <rect x="492" y="381" width="216" height="22" rx="4" fill="#0b1116"/>
  <text x="600" y="397" class="muted" font-size="12" text-anchor="middle" letter-spacing="1.5">public / private boundary</text>

  <!-- private service boundary panel -->
  <rect x="60" y="418" width="1080" height="66" rx="10" fill="#0e141b" stroke="#26333f" stroke-width="1"/>
  <text x="84" y="448" class="ptitle" font-size="15">PRIVATE SERVICE BOUNDARY</text>
  <text x="84" y="470" class="muted" font-size="15">Read-only mediation &#183; filtering &#183; private routing</text>

  <!-- private core panel -->
  <rect x="60" y="498" width="1080" height="80" rx="10" fill="#0e141b" stroke="#26333f" stroke-width="1"/>
  <rect x="60" y="508" width="4" height="60" fill="#d6a13c" fill-opacity="0.65"/>
  <text x="96" y="530" class="ptitle" font-size="15">PRIVATE CORE</text>
  <text x="96" y="554" class="sub" font-size="15">Decision memory &#183; Constraints &#183; Audit &#183; Proof &#183; Replay</text>

  <!-- footer -->
  <text x="600" y="610" class="muted" font-size="13" text-anchor="middle" letter-spacing="1">not commercial-ready</text>
</svg>
