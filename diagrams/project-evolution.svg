<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc"><title id="title">SCRIBE Project Evolution</title><desc id="desc">Project evolution from public doctrine to diagrams, examples, proof structures, cockpit and integrations, with the private engine boundary preserved.</desc><style>.bg{fill:#fff}.title{font:700 34px Arial;fill:#111827}.sub{font:400 18px Arial;fill:#4b5563}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:14;ry:14}.active{fill:#eff6ff;stroke:#2563eb;stroke-width:2.5;rx:18;ry:18}.private{fill:#f9fafb;stroke:#6b7280;stroke-width:2;stroke-dasharray:8 6;rx:18;ry:18}.label{font:600 20px Arial;fill:#111827}.small{font:400 16px Arial;fill:#374151}.arrow{stroke:#4b5563;stroke-width:2.5;fill:none;marker-end:url(#a)}.blue{font:600 18px Arial;fill:#2563eb}.foot{font:400 18px Arial;fill:#111827}</style><defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#4b5563"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700" y="70" text-anchor="middle">Project Evolution</text><text class="sub" x="700" y="102" text-anchor="middle">Public reasoning grows while the private engine remains protected</text><rect class="active" x="80" y="250" width="210" height="105"/><text class="label" x="185" y="292" text-anchor="middle">V0.1 Doctrine</text><text class="small" x="185" y="322" text-anchor="middle">Public principles</text><rect class="active" x="330" y="250" width="210" height="105"/><text class="label" x="435" y="292" text-anchor="middle">V0.2 Diagrams</text><text class="small" x="435" y="322" text-anchor="middle">Visual explanations</text><rect class="box" x="580" y="250" width="210" height="105"/><text class="label" x="685" y="292" text-anchor="middle">Examples</text><text class="small" x="685" y="322" text-anchor="middle">Fictional loops</text><rect class="box" x="830" y="250" width="210" height="105"/><text class="label" x="935" y="292" text-anchor="middle">Proof Structures</text><text class="small" x="935" y="322" text-anchor="middle">Content-free evidence</text><rect class="box" x="1080" y="250" width="210" height="105"/><text class="label" x="1185" y="292" text-anchor="middle">Cockpit</text><text class="small" x="1185" y="322" text-anchor="middle">Human visibility</text><path class="arrow" d="M290 302h40M540 302h40M790 302h40M1040 302h40"/><rect class="box" x="475" y="480" width="450" height="110"/><text class="label" x="700" y="522" text-anchor="middle">External Integrations</text><text class="small" x="700" y="552" text-anchor="middle">GitHub · coding agents · local environments</text><text class="small" x="700" y="578" text-anchor="middle">Connectivity must not bypass governance</text><path class="arrow" d="M1185 355c0 100-260 125-260 125"/><rect class="private" x="300" y="685" width="800" height="95"/><text class="label" x="700" y="725" text-anchor="middle">Private Engine Boundary</text><text class="small" x="700" y="755" text-anchor="middle">No private engine, sealed journals, internal prompts or sensitive proof artifacts in the public repo</text><text class="foot" x="700" y="840" text-anchor="middle">Public material explains the question and the protocol. Sensitive internals stay private.</text></svg>