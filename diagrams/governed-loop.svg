<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc"><title id="title">SCRIBE Governed Collaboration Loop</title><desc id="desc">Human intent flows through architect, execution contract, SCRIBE, coder and auditor, then human decision.</desc><style>.bg{fill:#fff}.title{font:700 34px Arial;fill:#111827}.sub{font:400 18px Arial;fill:#4b5563}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:14;ry:14}.scribe{fill:#eff6ff;stroke:#2563eb;stroke-width:2.5;rx:18;ry:18}.label{font:600 22px Arial;fill:#111827}.small{font:400 16px Arial;fill:#374151}.arrow{stroke:#4b5563;stroke-width:2.5;fill:none;marker-end:url(#a)}.blue{font:600 18px Arial;fill:#2563eb}.foot{font:400 18px Arial;fill:#111827}</style><defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#4b5563"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700" y="70" text-anchor="middle">The Governed Collaboration Loop</text><text class="sub" x="700" y="102" text-anchor="middle">From AI conversations to governed collaboration</text><rect class="box" x="560" y="140" width="280" height="70"/><text class="label" x="700" y="184" text-anchor="middle">Human Intent</text><path class="arrow" d="M700 210v42"/><rect class="box" x="560" y="255" width="280" height="72"/><text class="label" x="700" y="299" text-anchor="middle">Architect</text><path class="arrow" d="M700 327v42"/><rect class="box" x="520" y="372" width="360" height="78"/><text class="label" x="700" y="415" text-anchor="middle">Execution Contract</text><text class="small" x="700" y="438" text-anchor="middle">Scope · constraints · required evidence</text><path class="arrow" d="M700 450v45"/><rect class="scribe" x="455" y="498" width="490" height="120"/><text class="label" x="700" y="540" text-anchor="middle">SCRIBE</text><text class="small" x="700" y="568" text-anchor="middle">Decision Memory · Contracts · Routing · Evidence · Audit · Replay</text><text class="blue" x="700" y="595" text-anchor="middle">Governed coordination layer</text><path class="arrow" d="M610 618l-70 62"/><path class="arrow" d="M790 618l70 62"/><rect class="box" x="380" y="680" width="220" height="78"/><text class="label" x="490" y="725" text-anchor="middle">Coder</text><text class="small" x="490" y="748" text-anchor="middle">Proposes a bounded change</text><rect class="box" x="800" y="680" width="220" height="78"/><text class="label" x="910" y="725" text-anchor="middle">Auditor</text><text class="small" x="910" y="748" text-anchor="middle">Reviews risks and consistency</text><path class="arrow" d="M600 719h90"/><path class="arrow" d="M800 719h-90"/><path class="arrow" d="M700 618v172"/><rect class="box" x="555" y="790" width="290" height="70"/><text class="label" x="700" y="832" text-anchor="middle">Human Decision</text><text class="foot" x="700" y="885" text-anchor="middle">SCRIBE does not govern AI agents directly. It governs the interactions between them.</text></svg>