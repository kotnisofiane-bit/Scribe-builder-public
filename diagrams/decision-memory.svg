<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc"><title id="title">SCRIBE Decision Memory</title><desc id="desc">Decision memory preserves the path from intent to result rather than the whole conversation.</desc><style>.bg{fill:#fff}.title{font:700 34px Arial;fill:#111827}.sub{font:400 18px Arial;fill:#4b5563}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:14;ry:14}.mem{fill:#eff6ff;stroke:#2563eb;stroke-width:2.5;rx:18;ry:18}.label{font:600 19px Arial;fill:#111827}.small{font:400 15px Arial;fill:#374151}.arrow{stroke:#4b5563;stroke-width:2.4;fill:none;marker-end:url(#a)}.blue{font:600 20px Arial;fill:#2563eb}.foot{font:400 18px Arial;fill:#111827}</style><defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#4b5563"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700" y="70" text-anchor="middle">Decision Memory</text><text class="sub" x="700" y="102" text-anchor="middle">Conversation history records what was said. Decision memory preserves what became meaningful.</text><g transform="translate(80 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Intent</text><text class="small" x="75" y="62" text-anchor="middle">Original need</text></g><g transform="translate(260 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Contract</text><text class="small" x="75" y="62" text-anchor="middle">Scope and rules</text></g><g transform="translate(440 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Proposal</text><text class="small" x="75" y="62" text-anchor="middle">Bounded change</text></g><g transform="translate(620 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Audit</text><text class="small" x="75" y="62" text-anchor="middle">Advisory review</text></g><g transform="translate(800 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Evidence</text><text class="small" x="75" y="62" text-anchor="middle">Proof material</text></g><g transform="translate(980 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Decision</text><text class="small" x="75" y="62" text-anchor="middle">Human approval</text></g><g transform="translate(1160 235)"><rect class="box" x="0" y="0" width="150" height="86"/><text class="label" x="75" y="38" text-anchor="middle">Result</text><text class="small" x="75" y="62" text-anchor="middle">Execution state</text></g><path class="arrow" d="M230 278h30M410 278h30M590 278h30M770 278h30M950 278h30M1130 278h30"/><rect class="mem" x="240" y="470" width="920" height="180"/><text class="blue" x="700" y="520" text-anchor="middle">Decision Memory</text><text class="small" x="700" y="560" text-anchor="middle">Preserves decisions, reasons, constraints, evidence, approvals, outcomes and replay paths.</text><text class="small" x="700" y="595" text-anchor="middle">The goal is not to remember everything.</text><text class="small" x="700" y="625" text-anchor="middle">The goal is to remember what the project depends on.</text><path class="arrow" d="M700 321v145"/><text class="foot" x="700" y="770" text-anchor="middle">Conversations disappear. Decisions remain.</text></svg>