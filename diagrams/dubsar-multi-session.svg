<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">DUBSAR governed multi-session model</title>
  <desc id="desc">One canonical Mission with two isolated governed sessions, separate worktrees and evidence, explicit conflict handling, Human Gate, and resumable governed work.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#4fd1c5"/></marker>
    <marker id="g" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#d7a640"/></marker>
    <style>
      text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.bg{fill:#081016}.panel{fill:#0e1820;stroke:#2a3b47;stroke-width:1.5}.title{fill:#f4f7f9;font-size:34px;font-weight:700}.sub{fill:#9eacb8;font-size:17px}.label{fill:#f0f4f6;font-size:18px;font-weight:650}.small{fill:#bdc8d0;font-size:14px}.tiny{fill:#93a1ac;font-size:12px}.cyan{fill:#4fd1c5}.gold{fill:#d7a640}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    </style>
  </defs>
  <rect class="bg" width="1400" height="720"/>
  <rect x="22" y="22" width="1356" height="676" rx="18" fill="none" stroke="#1d2a34"/>
  <text x="60" y="78" class="title">Governed multi-session model</text>
  <text x="60" y="110" class="sub">One Mission. Separate identities, worktrees, processes and evidence. No silent overwrite.</text>

  <rect class="panel" x="60" y="205" width="230" height="260" rx="14"/>
  <text x="175" y="248" text-anchor="middle" class="label">Canonical Mission</text>
  <text x="175" y="278" text-anchor="middle" class="small">single source of truth</text>
  <line x1="95" y1="300" x2="255" y2="300" stroke="#2b3d48"/>
  <text x="90" y="338" class="small">• shared decisions</text>
  <text x="90" y="368" class="small">• active constraints</text>
  <text x="90" y="398" class="small">• lots and contracts</text>
  <text x="90" y="428" class="small">• Mission head + revision</text>

  <path d="M290 290 C350 290,350 225,410 225" fill="none" stroke="#4fd1c5" stroke-width="2" marker-end="url(#a)"/>
  <path d="M290 385 C350 385,350 475,410 475" fill="none" stroke="#4fd1c5" stroke-width="2" marker-end="url(#a)"/>

  <rect x="410" y="155" width="340" height="215" rx="14" fill="#0b1e22" stroke="#4fd1c5" stroke-width="2"/>
  <text x="580" y="194" text-anchor="middle" class="label cyan">Session A</text>
  <text x="445" y="230" class="small mono">dubsar_session_id: A</text>
  <text x="445" y="258" class="small mono">native_session_id: A</text>
  <text x="445" y="286" class="small mono">worktree: A</text>
  <text x="445" y="314" class="small mono">process identity: A</text>
  <text x="445" y="342" class="small mono">evidence stream: A</text>

  <rect x="410" y="405" width="340" height="215" rx="14" fill="#0e1925" stroke="#5da5e8" stroke-width="2"/>
  <text x="580" y="444" text-anchor="middle" class="label" fill="#70b8ff">Session B</text>
  <text x="445" y="480" class="small mono">dubsar_session_id: B</text>
  <text x="445" y="508" class="small mono">native_session_id: B</text>
  <text x="445" y="536" class="small mono">worktree: B</text>
  <text x="445" y="564" class="small mono">process identity: B</text>
  <text x="445" y="592" class="small mono">evidence stream: B</text>

  <path d="M750 260 C815 260,815 310,870 310" fill="none" stroke="#4fd1c5" stroke-width="2" marker-end="url(#a)"/>
  <path d="M750 510 C815 510,815 390,870 390" fill="none" stroke="#5da5e8" stroke-width="2" marker-end="url(#a)"/>

  <rect x="870" y="245" width="250" height="230" rx="14" fill="#18170e" stroke="#d7a640" stroke-width="2"/>
  <text x="995" y="286" text-anchor="middle" class="label gold">Conflict / shared gate</text>
  <line x1="900" y1="307" x2="1090" y2="307" stroke="#5b4a25"/>
  <text x="900" y="342" class="small">• overlapping scope</text>
  <text x="900" y="372" class="small">• stale revision</text>
  <text x="900" y="402" class="small">• incompatible decisions</text>
  <text x="900" y="432" class="small">• protected movement</text>
  <text x="995" y="458" text-anchor="middle" class="tiny gold">explicit human decision required</text>

  <line x1="1120" y1="360" x2="1190" y2="360" stroke="#d7a640" stroke-width="2" marker-end="url(#g)"/>

  <rect x="1190" y="245" width="150" height="230" rx="14" fill="#0c201d" stroke="#4fd1c5" stroke-width="2"/>
  <text x="1265" y="287" text-anchor="middle" class="label cyan">Resume</text>
  <text x="1265" y="324" text-anchor="middle" class="small">governed work</text>
  <text x="1265" y="362" text-anchor="middle" class="tiny">updated decisions</text>
  <text x="1265" y="386" text-anchor="middle" class="tiny">clear authority</text>
  <text x="1265" y="410" text-anchor="middle" class="tiny">separate evidence</text>
  <circle cx="1265" cy="443" r="13" fill="none" stroke="#4fd1c5" stroke-width="2"/><path d="M1258 443l5 5 10-12" fill="none" stroke="#4fd1c5" stroke-width="2"/>

  <path d="M580 370 C580 660,1190 660,1265 475" fill="none" stroke="#4fd1c5" stroke-dasharray="7 7" marker-end="url(#a)"/>
  <path d="M580 620 C580 675,1150 675,1265 475" fill="none" stroke="#5da5e8" stroke-dasharray="7 7"/>
  <text x="850" y="655" text-anchor="middle" class="tiny mono">full audit trail · evidence remains attributable to its session</text>

  <rect x="60" y="525" width="290" height="112" rx="12" fill="#0a171d" stroke="#2c414b"/>
  <text x="85" y="562" class="label cyan">Invariant</text>
  <text x="85" y="590" class="small">Shared Mission does not mean shared identity.</text>
  <text x="85" y="616" class="tiny">Each session remains independently attributable and controllable.</text>

  <text x="700" y="690" text-anchor="middle" class="tiny">Internal Windows technical proof completed · external product validation still pending</text>
</svg>