<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc"><title id="title">SCRIBE Execution Contract</title><desc id="desc">Execution contract defines objective, scope, allowed actions, forbidden actions, required evidence and human approval point.</desc><style>.bg{fill:#fff}.title{font:700 34px Arial;fill:#111827}.sub{font:400 18px Arial;fill:#4b5563}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:14;ry:14}.core{fill:#eff6ff;stroke:#2563eb;stroke-width:2.5;rx:18;ry:18}.label{font:600 22px Arial;fill:#111827}.small{font:400 16px Arial;fill:#374151}.arrow{stroke:#4b5563;stroke-width:2.5;fill:none;marker-end:url(#a)}.blue{font:600 20px Arial;fill:#2563eb}.foot{font:400 18px Arial;fill:#111827}</style><defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#4b5563"/></marker></defs><rect class="bg" width="1400" height="900"/><text class="title" x="700" y="70" text-anchor="middle">Execution Contract</text><text class="sub" x="700" y="102" text-anchor="middle">A contract does not guarantee correctness. It makes work governable.</text><rect class="core" x="470" y="325" width="460" height="200"/><text class="blue" x="700" y="375" text-anchor="middle">Execution Contract</text><text class="small" x="700" y="415" text-anchor="middle">Defines the boundary before work moves forward</text><text class="small" x="700" y="450" text-anchor="middle">Task becomes reviewable, auditable and replayable</text><rect class="box" x="115" y="200" width="275" height="95"/><text class="label" x="252" y="238" text-anchor="middle">Objective</text><text class="small" x="252" y="266" text-anchor="middle">What should change?</text><rect class="box" x="115" y="390" width="275" height="95"/><text class="label" x="252" y="428" text-anchor="middle">Scope</text><text class="small" x="252" y="456" text-anchor="middle">What is inside?</text><rect class="box" x="115" y="580" width="275" height="95"/><text class="label" x="252" y="618" text-anchor="middle">Forbidden Actions</text><text class="small" x="252" y="646" text-anchor="middle">What must not happen?</text><rect class="box" x="1010" y="200" width="275" height="95"/><text class="label" x="1147" y="238" text-anchor="middle">Allowed Actions</text><text class="small" x="1147" y="266" text-anchor="middle">What can be done?</text><rect class="box" x="1010" y="390" width="275" height="95"/><text class="label" x="1147" y="428" text-anchor="middle">Required Evidence</text><text class="small" x="1147" y="456" text-anchor="middle">What must be proven?</text><rect class="box" x="1010" y="580" width="275" height="95"/><text class="label" x="1147" y="618" text-anchor="middle">Approval Point</text><text class="small" x="1147" y="646" text-anchor="middle">Who must decide?</text><path class="arrow" d="M390 247l80 130M390 437h80M390 627l80-130M1010 247l-80 130M1010 437h-80M1010 627l-80-130"/><rect class="box" x="525" y="690" width="350" height="80"/><text class="label" x="700" y="725" text-anchor="middle">Fail Closed</text><text class="small" x="700" y="752" text-anchor="middle">If boundary or evidence is unclear, stop.</text><path class="arrow" d="M700 525v165"/><text class="foot" x="700" y="835" text-anchor="middle">Boundaries make useful AI work safer without making AI the final authority.</text></svg>