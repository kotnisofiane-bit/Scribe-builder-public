<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="SCRIBE — Decision memory and audit for AI-driven software projects">
  <title>SCRIBE — social preview</title>
  <desc>Sober social preview source: SCRIBE wordmark, a decision-trace mark with a central checkpoint, and the tagline. Public documentation, private core, not commercial-ready.</desc>

  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .brand { fill:#e6edf3; font-weight:700; letter-spacing:12px; }
    .tag   { fill:#c9d1d9; }
    .meta  { fill:#8b97a3; letter-spacing:1.5px; }
  </style>

  <!-- background -->
  <rect x="0" y="0" width="1280" height="640" fill="#0b1116"/>
  <rect x="24" y="24" width="1232" height="592" rx="18" fill="none" stroke="#1c2733" stroke-width="1"/>

  <!-- decision-trace mark: trace -> checkpoint -> trace -->
  <line x1="470" y1="214" x2="810" y2="214" stroke="#3fc7b4" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="470" cy="214" r="6" fill="#3fc7b4"/>
  <circle cx="555" cy="214" r="6" fill="#3fc7b4"/>
  <circle cx="640" cy="214" r="11" fill="none" stroke="#d6a13c" stroke-width="2.5"/>
  <circle cx="725" cy="214" r="6" fill="#3fc7b4"/>
  <circle cx="810" cy="214" r="6" fill="#3fc7b4"/>

  <!-- wordmark -->
  <text x="646" y="352" class="brand" font-size="76" text-anchor="middle">SCRIBE</text>
  <line x1="560" y1="388" x2="720" y2="388" stroke="#3fc7b4" stroke-width="2" stroke-opacity="0.6"/>

  <!-- tagline -->
  <text x="640" y="446" class="tag" font-size="26" text-anchor="middle">Decision memory and audit for AI-driven software projects.</text>

  <!-- meta line -->
  <text x="640" y="486" class="meta" font-size="17" text-anchor="middle">Public documentation &#183; Private core &#183; not commercial-ready</text>
</svg>
