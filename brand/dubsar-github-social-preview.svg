  <text x="640" y="450" class="tag" font-size="30" text-anchor="middle">Keep human authority.</text>

  <text x="640" y="515" class="meta" font-size="18" text-anchor="middle">Claude Code first · Multi-session governance · Windows private beta in preparation</text>
