<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="title desc">
  <title id="title">DUBSAR — Govern long-running AI development</title>
  <desc id="desc">DUBSAR social preview with graphite background, turquoise flow, gold Human Gate checkpoint, product tagline and current beta status.</desc>
  <style>
    text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.brand{fill:#f0f5f7;font-weight:750;letter-spacing:9px}.tag{fill:#d6e0e6}.meta{fill:#8fa0ac;letter-spacing:1px}.cyan{fill:#4fd1c5}.gold{fill:#d7a640}
  </style>
  <rect width="1280" height="640" fill="#081016"/>
  <rect x="24" y="24" width="1232" height="592" rx="20" fill="none" stroke="#1d2a34"/>
  <text x="70" y="82" class="cyan" font-size="22" font-weight="700" letter-spacing="2">DUBSAR</text>
  <text x="1210" y="80" class="meta" font-size="14" text-anchor="end">Private Core · Human authority</text>

  <line x1="350" y1="205" x2="930" y2="205" stroke="#4fd1c5" stroke-width="2" stroke-opacity="0.45"/>
  <circle cx="350" cy="205" r="7" fill="#4fd1c5"/>
  <circle cx="495" cy="205" r="7" fill="#4fd1c5"/>
  <circle cx="640" cy="205" r="13" fill="none" stroke="#d7a640" stroke-width="3"/>
  <circle cx="785" cy="205" r="7" fill="#4fd1c5"/>
  <circle cx="930" cy="205" r="7" fill="#4fd1c5"/>
  <text x="350" y="238" class="meta" font-size="13" text-anchor="middle">MISSION</text>
  <text x="495" y="238" class="meta" font-size="13" text-anchor="middle">SESSIONS</text>
  <text x="640" y="238" class="gold" font-size="13" text-anchor="middle">HUMAN GATE</text>
  <text x="785" y="238" class="meta" font-size="13" text-anchor="middle">EVIDENCE</text>
  <text x="930" y="238" class="meta" font-size="13" text-anchor="middle">REPLAY</text>

  <text x="640" y="350" class="brand" font-size="82" text-anchor="middle">DUBSAR</text>
